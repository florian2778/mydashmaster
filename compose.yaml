services:
  mydashmaster:
    build:
      context: .
    container_name: mydashmaster
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DEVICE_POLL_INTERVAL_MS: ${DEVICE_POLL_INTERVAL_MS:-10000}
      MYDASHMASTER_SESSION_SECRET: ${MYDASHMASTER_SESSION_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET}
    volumes:
      - ./data:/app/data
    networks:
      - traefik
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_NETWORK:-traefik}
      - traefik.http.routers.mydashmaster.rule=Host(`${MYDASHMASTER_HOST}`)
      - traefik.http.routers.mydashmaster.entrypoints=websecure
      - traefik.http.routers.mydashmaster.tls=true
      - traefik.http.services.mydashmaster.loadbalancer.server.port=3000

networks:
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik}
